<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invencible: Batalla Final</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main id="parallax-container">
        <div class="layer layer-bg">
            <div id="layer-bg-img"></div>
        </div>

        <div class="layer layer-sun">
            <img src="img/sol.png" id="sun-img" alt="Sol">
        </div>

        <div class="layer layer-earth">
            <img src="img/planeta.png" id="earth-img" alt="Tierra">
        </div>

        <div class="layer layer-moon">
            <img src="img/luna.png" id="moon-img" alt="Luna">
        </div>

        <div class="layer layer-mark">
            <img src="img/mark.png" id="mark-img" alt="Mark">
        </div>

        <div id="layer-asteroids" class="layer">
            <img src="img/asteroides.png" class="asteroide" style="top: 10%; left: 15%;">
            <img src="img/asteroides.png" class="asteroide" style="top: 40%; right: 20%; width: 250px;">
            <img src="img/asteroides.png" class="asteroide" style="top: 70%; left: 5%; width: 300px;">
        </div>
    </main>

    <section class="main-content">
        <div class="container">
            <div class="imagen_logo">
                <img src="img/invincible_logo.png" alt="">
            </div>
            <br><br>
            <div class="texto_inve">
                <p>El destino del universo está en juego, acompaña a Mark Grayson en sus aventuras.</p>
            </div>
             
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
